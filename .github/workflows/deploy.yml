name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Run linting
        run: npm run lint
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Measure bundle size
        run: node .github/size-report.mjs measure
      - name: Upload size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: size-report
          path: size-report.json
          if-no-files-found: ignore
          retention-days: 1
      # On a push to the default branch, cache the report keyed by commit SHA so
      # a later PR can restore its base commit's sizes and show per-chunk deltas
      - name: Cache size report for base diff
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v6
        with:
          path: size-report.json
          key: size-report-${{ github.sha }}

  # Posting the bundle-size PR comment is the only step that needs write access.
  # It runs in its own job that installs no dependencies, so the build job (which
  # runs `npm ci`, i.e. third-party install code) stays read-only and never holds
  # a PR-writable token. Job level is the narrowest scope GitHub Actions offers —
  # there is no per-step `permissions`.
  size-report:
    needs: build
    if: ${{ github.event_name == 'pull_request' && (needs.build.result == 'success' || needs.build.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Download PR size report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: size-report
          path: pr
      # The base commit's report, cached by its own main build.
      # A cache miss yields an absolute (no-delta) comment.
      - name: Restore baseline size report (base commit)
        uses: actions/cache/restore@v6
        with:
          path: size-report.json
          key: size-report-${{ github.event.pull_request.base.sha }}
      - name: Comment bundle size on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # Give the two reports clear names: the artifact (this PR's build) and the
        # restored cache (the base commit's build; absent on a miss → absolute).
        run: |
          [ -f pr/size-report.json ] && mv pr/size-report.json size-report-pr.json || true
          [ -f size-report.json ] && mv size-report.json size-report-baseline.json || true
          node .github/size-report.mjs comment size-report-pr.json size-report-baseline.json
