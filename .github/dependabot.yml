version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: 'npm'
    open-pull-requests-limit: 10
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # The Lighthouse engine and its Chrome launcher move together; an engine
      # bump can legitimately shift scores, and its PR validates itself against
      # the Lighthouse gate (see lighthouse-budget.js).
      lighthouse:
        patterns:
          - 'lighthouse'
          - 'chrome-launcher'
      mui:
        patterns:
          - '@mui*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
