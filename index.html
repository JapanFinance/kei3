<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japan Take-Home Pay Calculator</title>

    <!--
      Apply the color-scheme class to <html> before first paint so the correct
      background shows immediately, with no flash, even when the saved preference
      differs from the OS setting. MUI's variables are injected by JavaScript
      and are absent before the bundle runs, so the pre-paint colors come from
      static CSS keyed on this class. MUI (colorSchemeSelector: 'class') then
      manages the same .light/.dark class once it mounts. Inline and
      dependency-free so it runs while the document parses.
    -->
    <script>
      (() => {
        try {
          const legacy = localStorage.getItem('theme');
          if (legacy && !localStorage.getItem('mui-mode')) {
            localStorage.setItem('mui-mode', legacy);
          }
          const mode = localStorage.getItem('mui-mode') || 'system';
          const dark =
            mode === 'dark' ||
            (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.add(dark ? 'dark' : 'light');
        } catch {}
      })();
    </script>

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Calculate your take-home pay in Japan. Calculate income tax, residence tax, health insurance, pension, and Furusato Nozei allowance."
    />
    <link rel="canonical" href="https://kei3.japanfinance.org/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kei3.japanfinance.org/" />
    <meta property="og:title" content="Japan Take-Home Pay Calculator" />
    <meta
      property="og:description"
      content="Calculate your take-home pay in Japan. Calculate income tax, residence tax, health insurance, pension, and Furusato Nozei allowance."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://kei3.japanfinance.org/" />
    <meta property="twitter:title" content="Japan Take-Home Pay Calculator" />
    <meta
      property="twitter:description"
      content="Calculate your take-home pay in Japan. Calculate income tax, residence tax, health insurance, pension, and Furusato Nozei allowance."
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Japan Take-Home Pay Calculator",
        "applicationCategory": "FinanceApplication",
        "description": "A comprehensive calculator for Japan take-home pay, including income tax, residence tax, health insurance, pension, and Furusato Nozei limits.",
        "url": "https://kei3.japanfinance.org/",
        "offers": {
          "@type": "Offer",
          "price": "0"
        }
      }
    </script>

    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="root">
      <noscript>
        <h1>Japan Take-Home Pay Calculator</h1>
        <p>
          Calculate your take-home pay in Japan. Estimate income tax, residence tax, health
          insurance, pension, and Furusato Nozei allowance.
        </p>
        <p>You need to enable JavaScript to run this app.</p>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      Stale-build recovery. Browsers may restore a suspended tab (mobile tab
      discard, desktop session restore, back/forward) from a cached index.html
      without revalidating it (RFC 9111 exempts history-style loads), so a tab
      restored after a deploy would otherwise keep running the old app
      indefinitely — or render blank if its assets were evicted from the cache
      and the deploy has since removed them. SvelteKit (version.pollInterval /
      updated) and Nuxt (outdated-build check) ship the same recovery built in.

      Deliberately inlined, non-module, and dependency-free so it runs while
      the document parses even when every bundled asset fails to load; a
      version of this logic inside the entry chunk cannot recover from an
      evicted entry. It must stay after the entry <script> above so the entry
      tag is in the DOM when it reads it.

      Constraints discovered by testing real session restores (2026-07):
      - Fresh navigations and reloads always revalidate index.html (served
        max-age=0, must-revalidate), so only history-style boots (type
        "back_forward", Chrome's document.wasDiscarded, or an unreadable
        navigation type) can be stale — all other boots skip the probe and
        cost nothing.
      - The probe URL carries a unique query string because Chromium answers
        fetches issued during a session-restore boot from the HTTP cache even
        with cache:"no-store"; only never-cached URLs reach the network.
        (Workers assets ignores query strings when resolving paths. Nuxt uses
        the same Date.now() query technique.)
      - The reload this triggers boots with navigation type "reload", which
        never probes, so a reload loop is impossible; the sessionStorage
        marker is a redundant safeguard for intermediaries that keep serving
        the old HTML.
      - When offline, the fetch rejects and the cached app keeps working.
    -->
    <script>
      (() => {
        const navType = performance.getEntriesByType('navigation')[0]?.type;
        const historyStyleBoot =
          document.wasDiscarded === true || navType === undefined || navType === 'back_forward';
        if (!historyStyleBoot) return;
        const moduleSrcs = doc =>
          Array.from(doc.querySelectorAll('script[type="module"][src]'), s =>
            s.getAttribute('src'),
          ).join('\n');
        const bootedModules = moduleSrcs(document);
        if (!bootedModules) return;
        fetch(`/?stale-probe=${Date.now()}`, { cache: 'no-store' })
          .then(async response => {
            if (!response.ok) return;
            const latest = moduleSrcs(
              new DOMParser().parseFromString(await response.text(), 'text/html'),
            );
            if (!latest || latest === bootedModules) return;
            if (sessionStorage.getItem('reloaded-for-app-version') === latest) return;
            sessionStorage.setItem('reloaded-for-app-version', latest);
            window.location.reload();
          })
          .catch(() => {});
      })();
    </script>
  </body>
</html>
